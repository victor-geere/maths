name: maths
channels:
  - conda-forge
  - defaults
dependencies:
  # Python 3.12
  - python=3.12

  # Core Scientific Stack
  - numpy=2.1.3
  - scipy=1.14.1
  - sympy=1.13.3
  - mpmath=1.3.0
  - matplotlib=3.9.2

  # Performance
  - numba=0.65.1        # 0.60.0 requires numpy<1.27; 0.65.x supports numpy 2.x
  - numexpr=2.10.2
  - joblib=1.4.2

  # Visualization
  - plotly=5.24.1

  # SageMath: not available as a standalone conda-forge package on osx-arm64.
  # Install separately via pip or use the verify_with_sage MCP tool with a
  # system-level sage installation if needed.
  # - sagemath=10.5

  # Jupyter / Development
  - ipykernel=6.29.5
  - ipython=8.26.0

  # GPU Support (uncomment if needed)
  # - cupy=13.3.0          # CUDA 12.x