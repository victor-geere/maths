name: maths
channels:
  - conda-forge
  - defaults
dependencies:
  # Python 3.12
  - python=3.12

  # Core Scientific Stack
  - numpy=2.1.3
  - scipy=1.14.1
  - sympy=1.13.3
  - mpmath=1.3.0
  - matplotlib=3.9.2

  # Performance
  - numba=0.65.1        # 0.60.0 requires numpy<1.27; 0.65.x supports numpy 2.x
  - numexpr=2.10.2
  - joblib=1.4.2

  # Visualization
  - plotly=5.24.1

  # SageMath: installed in a SEPARATE conda env to avoid clobbering the pinned
  # numpy/sympy/mpmath versions above (Sage drags in its own incompatible pins).
  #   conda create -y -n sage -c conda-forge sage
  # The MCP server's verify_with_sage tool finds it via the SAGE_BIN env var
  # (set in .mcp.json) or by auto-detecting a sibling conda env named 'sage'.

  # Jupyter / Development
  - ipykernel=6.29.5
  - ipython=8.26.0

  # GPU Support (uncomment if needed)
  # - cupy=13.3.0          # CUDA 12.x